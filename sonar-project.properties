# ==============================================================================
# SonarQube Project Configuration
# ==============================================================================

# Project identification
sonar.projectKey=sportmatch-connect
sonar.projectName=SportMatch Connect
sonar.projectVersion=1.0.0

# Path to sources
sonar.sources=src,server/src

# Path to tests
sonar.tests=tests,server/src
sonar.test.inclusions=**/*.spec.ts,**/*.spec.tsx,**/*.test.ts,**/*.test.tsx

# Source/Test exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/server/dist/**,**/playwright-report/**,**/coverage/**,**/build/**,**/*.config.js,**/*.config.ts,**/*.spec.ts,**/*.spec.tsx,**/*.test.ts,**/*.test.tsx,**/test-results/**,**/.lovable/**,**/.opencode/**,**/.agents/**

# Encoding
sonar.sourceEncoding=UTF-8

# TypeScript configuration
sonar.typescript.tsconfigPaths=tsconfig.json,server/tsconfig.json

# Test coverage paths (Vitest/Jest lcov files)
sonar.javascript.lcov.reportPaths=coverage/lcov.info,server/coverage/lcov.info
