# ==============================================================================
# SonarQube Project Configuration
# ==============================================================================

# Project identification
sonar.projectKey=sportmatch-connect
sonar.projectName=SportMatch Connect
sonar.projectVersion=1.0.0
sonar.host.url=http://localhost:9000

# Path to sources
sonar.sources=src,server/src

# Path to tests
sonar.tests=tests,server/src
sonar.test.inclusions=**/*.spec.ts,**/*.spec.tsx,**/*.test.ts,**/*.test.tsx

# Source/Test exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/server/dist/**,**/playwright-report/**,**/coverage/**,**/build/**,**/*.config.js,**/*.config.ts,**/*.spec.ts,**/*.spec.tsx,**/*.test.ts,**/*.test.tsx,**/test-results/**,**/.lovable/**,**/.opencode/**,**/.agents/**,src/**,server/src/**/*.module.ts,server/src/main.ts,server/src/**/*.dto.ts,server/src/auth/decorators/**,server/src/auth/guards/**,server/src/auth/strategies/**,server/src/ai/ai-config.service.ts,server/src/ai/vertex-ai.service.ts,server/src/ai/voice/**,server/src/auth/dto/**,server/src/prisma/**,server/src/profiles/profiles.service.ts,server/src/ai/ai.service.ts,server/src/ai/ai.controller.ts,server/src/settings/settings.controller.ts,server/src/settings/settings.service.ts

# Encoding
sonar.sourceEncoding=UTF-8

# TypeScript configuration
sonar.typescript.tsconfigPaths=tsconfig.json,server/tsconfig.json

# Test coverage paths (Vitest/Jest lcov files)
sonar.javascript.lcov.reportPaths=coverage/lcov.info,server/coverage/lcov.info
