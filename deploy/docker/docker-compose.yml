# ============================================================
# docker-compose.yml — Entorno de desarrollo local
# Servicio web con Vite en modo dev, HMR con polling
# ============================================================

version: "3.8"

services:
  web:
    build:
      context: .
      target: dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_USE_MOCKS=true
